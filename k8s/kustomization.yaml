apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
  - https://github.com/TourinhoM/platform-app-base//base?ref=main

resources:
  - claims/appnamespace.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - name=app-bff
      - hostname=app-bff.local

images:
  - name: app-image
    newName: ghcr.io/tourinhoM/app-bff
    newTag: latest
