apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/TourinhoM/platform-app-base/base?ref=v1.0.0
  - claims/appnamespace.yaml

configMapGenerator:
  - name: app-config
    literals:
      - name=app-bff
      - hostname=app-bff.local

images:
  - name: app-image
    newName: ghcr.io/tourinhoM/app-bff
    newTag: latest
